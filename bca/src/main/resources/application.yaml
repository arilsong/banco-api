server:
  port: 8081

fsp:
  id: bca
  currency: CVE

spring:
  application:
    name: bca
  datasource:
    url: jdbc:h2:mem:bcacore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

logging:
  level:
    com.bca.api: DEBUG
    org.springframework.web: INFO

sdk:
  outbound:
    url: http://63.250.58.252:4001

