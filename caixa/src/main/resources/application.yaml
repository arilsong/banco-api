server:
  port: 8082

fsp:
  id: caixa
  currency: CVE

spring:
  application:
    name: caixa
  datasource:
    url: jdbc:postgresql://postgres:5432/caixacore
    driverClassName: org.postgresql.Driver
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.caixa.api: DEBUG
    org.springframework.web: INFO

sdk:
